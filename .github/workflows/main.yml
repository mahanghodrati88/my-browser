name: 🚀 Monster Video Engine Pro
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'لینک ویدیو یا کلمه کلیدی (مثلا phsearch10:blonde)'
        required: true
      quality_limit:
        description: 'حداکثر کیفیت (720, 1080, best)'
        default: 'best'

jobs:
  ultimate_process:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠 Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install --upgrade pip
          pip install yt-dlp colorama

      - name: 🌪 Monster Scraper Core
        shell: python
        run: |
          import yt_dlp
          import os
          import sys
          import json
          from colorama import Fore, Style, init

          init(autoreset=True)

          # --- CONFIGURATION ---
          TARGET = "${{ github.event.inputs.target }}"
          QUALITY = "${{ github.event.inputs.quality_limit }}"
          
          def print_banner():
              banner = f"""
              {Fore.RED}############################################################
              {Fore.YELLOW}          🚀 MONSTER VIDEO SCRAPER ENGINE v4.0
              {Fore.CYAN}    POWERED BY GITHUB CLOUD - BYPASSING FILTRATION
              {Fore.RED}############################################################
              """
              print(banner)

          def get_monster_opts():
              return {
                  'quiet': True,
                  'no_warnings': True,
                  'format': f'bestvideo[height<={QUALITY}]+bestaudio/best[height<={QUALITY}]' if QUALITY != 'best' else 'best',
                  'extract_flat': 'in_playlist' if 'search' in TARGET else False,
                  'nocheckcertificate': True,
                  'ignoreerrors': True,
                  'no_color': False,
                  'geo_bypass': True,
                  'user_agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'referer': 'https://www.google.com/',
              }

          def process():
              print_banner()
              print(f"{Fore.GREEN}[*] Initializing Attack on Target: {Style.BRIGHT}{TARGET}")
              
              ydl_opts = get_monster_opts()
              
              with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                  try:
                      info = ydl.extract_info(TARGET, download=False)
                      
                      if not info:
                          print(f"{Fore.RED}[!] Error: No data could be retrieved. Target might be protected.")
                          return

                      # CASE 1: SEARCH RESULTS OR PLAYLIST
                      if 'entries' in info:
                          entries = [e for e in info['entries'] if e is not None]
                          print(f"{Fore.MAGENTA}[+] Found {len(entries)} Potential Targets:\n")
                          print(f"{Fore.WHITE}{'#'*60}")
                          for i, entry in enumerate(entries, 1):
                              title = entry.get('title', 'N/A')
                              v_url = entry.get('url', entry.get('webpage_url', 'N/A'))
                              dur = entry.get('duration_string', '??:??')
                              print(f"{Fore.YELLOW}{i}. {Fore.WHITE}{title}")
                              print(f"   {Fore.CYAN}⏱ {dur} | {Fore.BLUE}🔗 {v_url}")
                              print(f"{Fore.WHITE}{'-'*60}")
                      
                      # CASE 2: SINGLE VIDEO EXTRACTION
                      else:
                          print(f"{Fore.MAGENTA}[+] Target Identified Successfully!")
                          print(f"{Fore.WHITE}Title: {Fore.YELLOW}{info.get('title')}")
                          print(f"{Fore.WHITE}Uploader: {Fore.YELLOW}{info.get('uploader')}")
                          print(f"{Fore.WHITE}Duration: {Fore.YELLOW}{info.get('duration_string')}")
                          print(f"{Fore.WHITE}Views: {Fore.YELLOW}{info.get('view_count', 'N/
