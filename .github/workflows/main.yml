LOG_FORMAT = f"{Fore.CYAN}%(asctime)s{Style.RESET_ALL} | %(levelname)s | %(message)s"
logging.basicConfig(level=logging.INFO, format=LOG_FORMAT)
logger = logging.getLogger("UltimateEngine")

class VideoEngine:
    """
    موتور پیشرفته استخراج و تحلیل ویدیو
    طراحی شده برای دور زدن محدودیت‌های IP و استخراج حداکثری دیتا
    """
    
    def __init__(self, target, mode):
        self.target = target
        self.mode = mode
        self.results = []
        self.session_id = datetime.now().strftime("%Y%m%d_%H%M%S")
        
    def get_ydl_options(self):
        """تنظیمات فوق پیشرفته برای استخراج بدون بلاک شدن"""
        return {
            'quiet': True,
            'no_warnings': True,
            'format': 'bestvideo+bestaudio/best',
            'extract_flat': 'in_playlist' if 'search' in self.target else False,
            'ignoreerrors': True,
            'no_color': False,
            'user_agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36',
            'referer': 'https://www.google.com/',
            'geo_bypass': True,
            'nocheckcertificate': True,
        }

    def print_banner(self):
        print(f"\n{Fore.YELLOW}{'='*70}")
        print(f"{Fore.MAGENTA}🚀 ULTIMATE SCRAPER ENGINE v2.5 | SESSION: {self.session_id}")
        print(f"{Fore.YELLOW}{'='*70}\n")

    def process_metadata(self, info):
        """تحلیل عمیق داده‌های دریافتی"""
        data = {
            'title': info.get('title', 'Unknown'),
            'duration': info.get('duration_string', 'N/A'),
            'uploader': info.get('uploader', 'Unknown'),
            'views': info.get('view_count', 0),
            'tags': info.get('tags', []),
            'thumbnail': info.get('thumbnail', ''),
            'webpage': info.get('webpage_url', '')
        }
        return data

    def extract_direct_links(self, info):
        """تکنیک استخراج لینک مستقیم با تست زنده بودن"""
        formats = info.get('formats', [])
        valid_links = []
        logger.info(f"Analyzing {len(formats)} possible stream formats...")
        
        for f in formats:
            # فیلتر کردن لینک‌های m3u8 که در دانلودرهای معمولی اذیت می‌کنند
            if f.get('url') and 'm3u8' not in f.get('url'):
                valid_links.append({
                    'quality': f.get('format_note', 'Unknown'),
                    'ext': f.get('ext', 'mp4'),
                    'url': f.get('url')
                })
        return valid_links

    def run(self):
        self.print_banner()
        logger.info(f"Target Acquired: {Fore.GREEN}{self.target}")
        logger.info(f"Mode: {Fore.BLUE}{self.mode}")

        with yt_dlp.YoutubeDL(self.get_ydl_options()) as ydl:
            try:
                # مرحله ۱: استخراج اطلاعات خام
                raw_info = ydl.extract_info(self.target, download=False)
                
                if not raw_info:
                    logger.error("No data returned from server.")
                    return

                # مرحله ۲: تفکیک لیست (جستجو) از تک ویدیو
                if 'entries' in raw_info:
                    logger.info(f"Detected Playlist/Search result with {len(raw_info['entries'])} items.")
                    for entry in raw_info['entries']:
                        if entry:
                            print(f"{Fore.GREEN}📌 {entry.get('title')[:60]}...")
                            print(f"   🔗 URL: {entry.get('url')}")
                            print(f"   ⏱ Time: {entry.get('duration_string', 'N/A')}\n")
                else:
